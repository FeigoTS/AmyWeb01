            height: auto; /* 高度自動，保持原圖比例 */
            border-radius: 15px; /* 微微的圓角，比直角更溫暖 */
            border: 4px solid var(--primary-gold);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background-color: #fff;
            object-fit: contain;
        }

        /* 英雄卡片排版 */
        .hero-card {

            box-shadow: 0 10px 30px rgba(0,0,0,0.1);

            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; width: 100%; max-width: 400px;

        .stat-item { background: #fff; padding: 15px; border-radius: 10px; border-bottom: 3px solid var(--primary-gold); text-align: center; }

        /* 底部固定按鈕：LINE 優先 */
        .sticky-contact {
            position: fixed; bottom: 0; width: 100%; display: flex; z-index: 2000;
        }
        .sticky-btn {
            flex: 1; padding: 15px; text-align: center; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-line { background: var(--line-green); color: white; }
        .btn-phone { background: var(--primary-gold); color: white; }

        section { padding: 60px 20px; max-width: 1000px; margin: auto; padding-bottom: 100px; }
        .section-title { text-align: center; color: var(--primary-gold); margin-bottom: 30px; position: relative; }
        .section-title::after { content: ''; display: block; width: 50px; height: 3px; background: var(--primary-gold); margin: 10px auto; }

        /* 榮譽榜優化 */

        }

        @media (max-width: 768px) {

    </style>
</head>
